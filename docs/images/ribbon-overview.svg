<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Vetheprevit ribbon overview</title>
  <desc id="desc">Ribbon TOOL CT in Revit with buttons for drawing abutment rebar and resolving rebar clashes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1100" height="360" fill="url(#bg)"/>
  <text x="64" y="66" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Vetheprevit for Revit 2027</text>
  <text x="64" y="102" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="17">Add-in ve thep mo cau, quan ly ten thep va ne thep giao nhau trong cung tab TOOL CT.</text>

  <g transform="translate(64 142)" filter="url(#shadow)">
    <rect width="972" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect width="972" height="42" rx="10" fill="#1f2937"/>
    <rect y="32" width="972" height="10" fill="#1f2937"/>
    <text x="26" y="28" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Revit Ribbon</text>
    <rect x="145" y="8" width="94" height="26" rx="5" fill="#2563eb"/>
    <text x="168" y="27" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">TOOL CT</text>

    <g transform="translate(26 62)">
      <text x="0" y="70" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="13">Panel: Mo Cau</text>
      <g transform="translate(126 0)">
        <rect width="132" height="72" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
        <path d="M38 48 L38 22 L58 22 L58 48 M74 48 L74 22 L94 22 L94 48" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
        <text x="66" y="88" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Ve Thep Be Mo</text>
      </g>
      <g transform="translate(286 0)">
        <rect width="132" height="72" rx="8" fill="#fff7ed" stroke="#fdba74"/>
        <path d="M30 48 C54 20 82 20 106 48" fill="none" stroke="#ea580c" stroke-width="6" stroke-linecap="round"/>
        <path d="M28 28 L108 28" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
        <text x="66" y="88" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Ne Thep Giao Nhau</text>
      </g>
      <g transform="translate(470 8)">
        <rect width="410" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="22" y="25" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Quy trinh nhanh</text>
        <text x="22" y="45" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="13">Chon mo cau - cau hinh thep - ve - dat ten - ne giao nhau</text>
      </g>
    </g>
  </g>
</svg>
